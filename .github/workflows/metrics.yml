name: GitHub Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: bhavesh158
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Kolkata
          base: header, activity, community, repositories

          # Full-year contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Language breakdown with line counts
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage, lines
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15

          # Recent activity feed
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all

          # Coding habits — peak hours, days, chart
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_charts: yes
          plugin_habits_facts: yes
          plugin_habits_charts_type: classic

          # GitHub achievements (unlocked + in-progress)
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0

          # Notable contributions to external repos
          plugin_notable: yes
          plugin_notable_types: commit
